{% extends 'base.html' %}
{% block content %}
<h1>Admin dashboard ({{ user }})</h1>
<a href="/admin/logout">Uitloggen</a>
{% if is_superadmin %}
<section>
  <h2>Nieuw toernooi aanmaken (super admin)</h2>
  <form method="post" action="/admin/tournament/create">
    <label>Naam <input name="name" required></label>
    <label>Datum <input type="date" name="planned_date" required></label>
    <label>Aantal banen <input type="number" name="board_count" min="1" value="3" required></label>
    <label>Max deelnemers <input type="number" name="max_participants" min="2" value="24" required></label>
    <button type="submit">Toernooi aanmaken</button>
  </form>
</section>
{% endif %}
<ul>
  {% for t in tournaments %}
  <li><a href="/admin/tournament/{{ t.id }}">{{ t.name }}</a></li>
  {% else %}
  <li>Geen gekoppelde toernooien.</li>
  {% endfor %}
</ul>
{% endblock %}
